<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- Nền bo tròn -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Hạt nhân trung tâm -->
  <circle cx="32" cy="32" r="5.5" fill="#FFFFFF"/>

  <!-- Quỹ đạo electron 1 -->
  <ellipse cx="32" cy="32" rx="22" ry="9"
           fill="none" stroke="#FFFFFF" stroke-width="2.2" opacity="0.9"
           transform="rotate(0 32 32)"/>

  <!-- Quỹ đạo electron 2 -->
  <ellipse cx="32" cy="32" rx="22" ry="9"
           fill="none" stroke="#FFFFFF" stroke-width="2.2" opacity="0.9"
           transform="rotate(60 32 32)"/>

  <!-- Quỹ đạo electron 3 -->
  <ellipse cx="32" cy="32" rx="22" ry="9"
           fill="none" stroke="#FFFFFF" stroke-width="2.2" opacity="0.9"
           transform="rotate(120 32 32)"/>

  <!-- Các electron -->
  <circle cx="54" cy="32" r="3" fill="#FACC15"/>
  <circle cx="16" cy="22.5" r="3" fill="#FACC15"/>
  <circle cx="22" cy="44" r="3" fill="#FACC15"/>
</svg>
